services:

  # -- PostgreSQL --
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - "/opt/infrakit/data/designflow/postgres:/var/lib/postgresql/data"
      - "./init/postgres:/docker-entrypoint-initdb.d:ro"
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "max_connections=100"]
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_64_POSTGRES}
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - infrakit

  # -- PgBouncer --
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-app}:${SERVICE_PASSWORD_64_POSTGRES}@postgres:5432/${DB_NAME:-app}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CONN:-200}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_POOL_SIZE:-20}
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    networks:
      - infrakit

  # -- Valkey --
  valkey:
    image: valkey/valkey:latest
    restart: unless-stopped
    command: ["valkey-server", "--requirepass", "${SERVICE_PASSWORD_64_VALKEY}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - "/opt/infrakit/data/designflow/valkey:/data"
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${SERVICE_PASSWORD_64_VALKEY}", "ping"]
      interval: 10s
    networks:
      - infrakit

  # -- Garage S3 --
  garage:
    build:
      context: ./init/garage_v2
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - "/opt/infrakit/data/designflow/garage/data:/var/lib/garage/data"
      - "/opt/infrakit/data/designflow/garage/meta:/var/lib/garage/meta"
    # Configuration is baked into the custom image, bypassing host directory/file confusion
    environment:
      GARAGE_RPC_SECRET: ${SERVICE_PASSWORD_64_GARAGE_RPC}
      GARAGE_ADMIN_TOKEN: ${SERVICE_PASSWORD_64_GARAGE_ADMIN}
    networks:
      - infrakit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.garages3.rule=Host(`${GARAGE_S3_API_DOMAIN}`)"
      - "traefik.http.services.garages3.loadbalancer.server.port=3900"

  # -- GlitchTip --
  glitchtip:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-app}:${SERVICE_PASSWORD_64_POSTGRES}@postgres:5432/glitchtip
      VALKEY_URL: redis://:${SERVICE_PASSWORD_64_VALKEY}@valkey:6379/0
      SECRET_KEY: ${SERVICE_PASSWORD_64_GLITCHTIP}
      PORT: "8000"
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
      GLITCHTIP_SUPERUSER_EMAIL: ${ADMIN_EMAIL}
      GLITCHTIP_SUPERUSER_PASSWORD: ${ADMIN_PASSWORD}
    networks:
      - infrakit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glitchtip.rule=Host(`${GLITCHTIP_DOMAIN}`)"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"

  # -- GlitchTip Worker --
  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      glitchtip:
        condition: service_started
    command: bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${DB_USER:-app}:${SERVICE_PASSWORD_64_POSTGRES}@postgres:5432/glitchtip
      VALKEY_URL: redis://:${SERVICE_PASSWORD_64_VALKEY}@valkey:6379/0
      SECRET_KEY: ${SERVICE_PASSWORD_64_GLITCHTIP}
    networks:
      - infrakit

  # -- Adminer --
  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - infrakit

  # -- Uptime Kuma --
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    volumes:
      - "/opt/infrakit/data/designflow/uptime-kuma:/app/data"
    networks:
      - infrakit

  # -- Filestash --
  filestash:
    image: machines/filestash:latest
    restart: unless-stopped
    volumes:
      - "/opt/infrakit/data/designflow/filestash:/app/data/state"
    networks:
      - infrakit

  # -- InfraPanel & Garage Setup --
  infrapanel:
    build:
      context: ./infrapanel
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PANEL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_PASSWORD=${SERVICE_PASSWORD_64_VALKEY}
      - STORAGE_ENDPOINT=http://garage:3900
      - STORAGE_REGION=${STORAGE_REGION:-us-east-1}
      - STORAGE_ACCESS_KEY_ID=${SERVICE_PASSWORD_64_GARAGE_ACCESS}
      - STORAGE_SECRET_ACCESS_KEY=${SERVICE_PASSWORD_64_GARAGE_SECRET}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_CAPACITY=${STORAGE_CAPACITY:-1G}
      - GARAGE_ADMIN_TOKEN=${SERVICE_PASSWORD_64_GARAGE_ADMIN}
      - GARAGE_RPC_SECRET=${SERVICE_PASSWORD_64_GARAGE_RPC}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN}
      - FILESTASH_DOMAIN=${FILESTASH_DOMAIN}
      - UPTIME_KUMA_DOMAIN=${UPTIME_KUMA_DOMAIN}
      - ADMINER_DOMAIN=${ADMINER_DOMAIN}
    networks:
      - infrakit
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      garage:
        condition: service_started

  # -- Caddy --
  caddy-internal:
    build:
      context: ./init/caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - infrakit
    depends_on:
      - infrapanel
      - adminer
      - filestash
      - uptime-kuma

  # -- Tailscale VPN --
  tailscale-vpn:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    environment:
      - TS_HOSTNAME=infrakit-secure
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    volumes:
      - "/opt/infrakit/data/designflow/tailscale:/var/lib/tailscale"
    networks:
      - infrakit

networks:
  infrakit:
